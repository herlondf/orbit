name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyside-app/requirements.txt
      - run: pip install ruff
      - name: Ruff lint (errors only)
        run: ruff check pyside-app/ --select=F --ignore=F401,F841 --exit-zero

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyside-app/requirements.txt

      - name: Install Qt deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libegl1 libopengl0 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libgbm1 libxcomposite1 libxdamage1 \
            libxrandr2 libxtst6 \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0

      - name: Install dependencies
        run: pip install -r pyside-app/requirements.txt pytest pytest-timeout pytest-qt cryptography

      - name: Run tests
        working-directory: pyside-app
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONDONTWRITEBYTECODE: "1"
        run: pytest tests/ -q --timeout=60 --tb=short

      - name: Import check
        working-directory: pyside-app
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "from app.window import OrbitWindow; print('Window OK')"
          python -c "from app.catalog import CATALOG; print(f'Catalog OK: {len(CATALOG)} services')"
          python -c "from app.encryption import encrypt_data, decrypt_data; print('Encryption OK')"

  build:
    name: Build check (Windows)
    runs-on: windows-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyside-app/requirements.txt
      - run: pip install -r pyside-app/requirements.txt pyinstaller pytest-qt cryptography
      - name: PyInstaller smoke test
        working-directory: pyside-app
        run: |
          pyinstaller --noconfirm --onedir --name Orbit --noconsole `
            --hidden-import PySide6.QtSvg `
            --hidden-import PySide6.QtWebEngineCore `
            --hidden-import cryptography `
            main.py
        continue-on-error: true
