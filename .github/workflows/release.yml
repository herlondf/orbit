name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Extract version + changelog ────────────────────────────────────
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          changelog=$(awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$changelog" ]; then
            prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$prev_tag" ]; then
              changelog=$(git log --pretty=format:"- %s" "${prev_tag}..HEAD" --no-merges)
            else
              changelog=$(git log --pretty=format:"- %s" -20 --no-merges)
            fi
          fi
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$changelog"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

  # ── Build Windows installers ───────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64
          cache: pip
          cache-dependency-path: pyside-app/requirements.txt

      - name: Install dependencies
        run: pip install -r pyside-app/requirements.txt pyinstaller pytest-qt cryptography

      - name: Stamp version into updater.py
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          sed -i "s/^APP_VERSION = .*/APP_VERSION = '${version}'/" pyside-app/app/updater.py

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --name Orbit --noconsole `
            --icon pyside-app\resources\icon.ico `
            --workpath build --distpath dist `
            --add-data "pyside-app\assets;assets" `
            --add-data "pyside-app\resources;resources" `
            --hidden-import PySide6.QtSvg `
            --hidden-import PySide6.QtSvgWidgets `
            --hidden-import PySide6.QtWebEngineCore `
            --hidden-import PySide6.QtWebEngineWidgets `
            --hidden-import PySide6.QtMultimedia `
            --hidden-import cryptography `
            --hidden-import cryptography.hazmat.primitives.ciphers.aead `
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 `
            pyside-app\main.py

      - name: Create update manifest (latest.json)
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          repo="${{ github.repository }}"
          base="https://github.com/${repo}/releases/download/v${version}"
          cat > dist/Orbit/latest.json <<MANIFEST
          {
            "version": "${version}",
            "channel": "stable",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "release_url": "https://github.com/${repo}/releases/tag/v${version}",
            "assets": {
              "win-x64-zip":  "${base}/Orbit-${version}-win-x64.zip",
              "win-x64-msi":  "${base}/Orbit-${version}-win-x64.msi",
              "win-x64-msix": "${base}/Orbit-${version}-win-x64.msix"
            },
            "changelog_url": "https://github.com/${repo}/blob/main/CHANGELOG.md"
          }
          MANIFEST

      - name: Package ZIP
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          Compress-Archive -Path "dist\Orbit\*" -DestinationPath "Orbit-${version}-win-x64.zip"

      - name: Debug - List dist directory
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "CWD: $PWD"
          if (Test-Path "dist\Orbit") {
            Get-ChildItem "dist\Orbit" | Select-Object Name, Length | Format-Table
          } else {
            Write-Host "dist\Orbit does not exist"
          }

      - name: Build MSI (WiX v4)
        shell: pwsh
        continue-on-error: true
        run: |
          # Install WiX v4 as global dotnet tool
          dotnet tool install --global wix 2>&1 | Write-Host
          # Refresh PATH so wix.exe is found in the current session
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          if (-not (Get-Command wix -ErrorAction SilentlyContinue)) {
            Write-Host "WiX not available after install — skipping MSI"
            exit 0
          }
          Write-Host "WiX version: $(wix --version)"
          $distPath = Join-Path $PWD "dist\Orbit"
          & pwsh -File installer\build_msi.ps1 -Version "${{ needs.prepare.outputs.version }}" -DistPath $distPath
          if (Test-Path "dist\Orbit-Setup.msi") {
            $version = "${{ needs.prepare.outputs.version }}"
            Move-Item "dist\Orbit-Setup.msi" "Orbit-${version}-win-x64.msi"
            Write-Host "MSI ready: Orbit-${version}-win-x64.msi"
          } else {
            Write-Host "MSI output not found after build"
          }

      - name: Build MSIX
        shell: pwsh
        continue-on-error: true
        run: |
          $distPath = Join-Path $PWD "dist\Orbit"
          & pwsh -File installer\build_msix.ps1 -DistPath $distPath
          if (Test-Path "dist\Orbit-Setup.msix") {
            $version = "${{ needs.prepare.outputs.version }}"
            Move-Item "dist\Orbit-Setup.msix" "Orbit-${version}-win-x64.msix"
            Write-Host "MSIX ready: Orbit-${version}-win-x64.msix"
          } else {
            Write-Host "MSIX output not found after build"
          }
          # Copy public cert and install helper script alongside MSIX
          if (Test-Path "dist\Orbit-Dev.cer") {
            Copy-Item "dist\Orbit-Dev.cer" "Orbit-Dev.cer"
          }
          Copy-Item "installer\install-orbit.ps1" "install-orbit.ps1"

      - name: Copy update manifest to release root
        shell: pwsh
        run: |
          if (Test-Path "dist\Orbit\latest.json") {
            Copy-Item "dist\Orbit\latest.json" "latest.json"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            Orbit-*.zip
            Orbit-*.msi
            Orbit-*.msix
            Orbit-Dev.cer
            install-orbit.ps1
            latest.json

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List release files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Orbit v${{ needs.prepare.outputs.version }}"
          body: |
            ## What's New in v${{ needs.prepare.outputs.version }}

            ${{ needs.prepare.outputs.changelog }}

            ---

            ### Downloads

            | File | Description |
            |------|-------------|
            | `Orbit-${{ needs.prepare.outputs.version }}-win-x64.zip` | 📦 Portable — unzip and run `Orbit.exe` |
            | `Orbit-${{ needs.prepare.outputs.version }}-win-x64.msi` | 🔧 MSI Installer (Windows 10/11, recommended) |
            | `Orbit-${{ needs.prepare.outputs.version }}-win-x64.msix` | 📱 MSIX package (Windows 10/11) |
            | `install-orbit.ps1` | ⚙️ MSIX install helper (imports cert + installs) |
            | `Orbit-Dev.cer` | 🔑 Developer certificate (needed for MSIX) |
            | `latest.json` | 🔄 Update manifest |

            ### Installing MSIX
            Download `Orbit-Dev.cer`, `Orbit-*.msix` and `install-orbit.ps1` to the same folder, then:
            ```powershell
            powershell -ExecutionPolicy Bypass -File install-orbit.ps1
            ```

            ### Update from the app
            Orbit will notify you of this update automatically.
            Go to **Help → Check for Updates** to update now.
          files: artifacts/*
          fail_on_unmatched_files: false
